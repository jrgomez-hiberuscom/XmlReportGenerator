name: GenerateXml
description: Generates a fictitious but schema-valid XML document from an XSD schema and instructions.
template_format: semantic-kernel
template: |
  You are an XML data generator. Generate a valid XML for this schema. Return ONLY XML, no explanations.

  XSD:
  {{$xsdContent}}

  Instructions:
  {{$markdownInstructions}}

input_variables:
  - name: xsdContent
    description: The XSD schema content.
  - name: markdownInstructions
    description: Instructions describing what data to generate.

execution_settings:
  default:
    temperature: 0.7
    max_tokens: 4096